<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACK-TIGER UNIVERSITY · Tableau de bord</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts - Polices élégantes -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8B5CF6;
            --primary-light: #A78BFA;
            --primary-dark: #7C3AED;
            --secondary: #EC4899;
            --accent: #06B6D4;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --dark: #0F172A;
            --light: #F8FAFC;
            --gradient-primary: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%);
            --gradient-success: linear-gradient(135deg, #10B981 0%, #06B6D4 100%);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea10 0%, #764ba210 100%);
            min-height: 100vh;
            color: var(--dark);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(139,92,246,0.03) 0%, transparent 50%);
            animation: rotate 60s linear infinite;
            z-index: -1;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(236,72,153,0.03) 0%, transparent 50%);
            animation: rotateReverse 70s linear infinite;
            z-index: -1;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes rotateReverse {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        .navbar {
            background: rgba(255,255,255,0.8) !important;
            backdrop-filter: blur(12px) saturate(180%);
            border-bottom: 1px solid rgba(139,92,246,0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            padding: 1rem 2rem !important;
            margin-bottom: 2rem;
            border-radius: 0 0 30px 30px;
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .navbar-brand i {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 10px;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(139,92,246,0.1);
            border-radius: 40px;
            padding: 3rem;
            margin-bottom: 3rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.02);
            text-align: center;
        }

        .welcome-title {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .welcome-subtitle {
            color: var(--gray-4);
            font-size: 1.2rem;
            max-width: 600px;
            margin: 0 auto;
        }

        .options {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 3rem;
        }

        .option-card {
            flex: 1;
            min-width: 300px;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(139,92,246,0.1);
            border-radius: 40px;
            padding: 3rem 2rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.02);
        }

        .option-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.7s ease;
        }

        .option-card:hover::before {
            left: 100%;
        }

        .option-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(139,92,246,0.15);
            border-color: rgba(139,92,246,0.3);
        }

        .option-icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
            background: linear-gradient(135deg, rgba(139,92,246,0.1) 0%, rgba(236,72,153,0.1) 100%);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .option-icon i {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .option-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .option-desc {
            color: var(--gray-4);
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .admin-badge {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background: rgba(139,92,246,0.1);
            border-radius: 50px;
            color: var(--primary);
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
            <i class="fas fa-graduation-cap"></i>
            BLACK-TIGER UNIVERSITY
        </a>
    </div>
</nav>

<div class="container">
    
    <div class="welcome-card">
        <h1 class="welcome-title">Bienvenue</h1>
        <p class="welcome-subtitle">Une gestion scolaire élégante et intuitive</p>
    </div>

    <div class="options">
        
        <!-- Espace Étudiant -->
        <a href="/etudiants/bulletin" class="option-card">
            <div class="option-icon">
                <i class="fas fa-user-graduate"></i>
            </div>
            <h2 class="option-title">Espace Étudiant</h2>
            <p class="option-desc">Consultez vos notes, votre bulletin et suivez votre progression académique</p>
        </a>
        
        <!-- Espace Administration -->
        <a href="/admin/login" class="option-card">
            <div class="option-icon">
                <i class="fas fa-user-tie"></i>
            </div>
            <h2 class="option-title">Espace Administration</h2>
            <p class="option-desc">Gérez les professeurs, les matières, les notes et les inscriptions</p>
            <span class="admin-badge">Accès réservé</span>
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
