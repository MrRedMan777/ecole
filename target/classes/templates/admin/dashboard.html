<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administration · Tableau de bord</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8B5CF6;
            --secondary: #EC4899;
            --gradient-primary: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%);
            --gradient-success: linear-gradient(135deg, #10B981 0%, #06B6D4 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea10 0%, #764ba210 100%);
            min-height: 100vh;
        }

        .navbar {
            background: rgba(255,255,255,0.8) !important;
            backdrop-filter: blur(12px) saturate(180%);
            border-bottom: 1px solid rgba(139,92,246,0.1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            padding: 1rem 2rem !important;
            border-radius: 0 0 30px 30px;
        }

        .navbar-brand {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            font-size: 1.8rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .navbar-brand i {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-right: 10px;
        }

        .btn-logout {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 0.6rem 1.5rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139,92,246,0.3);
            color: white;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 2rem;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-header {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(139,92,246,0.1);
            border-radius: 30px;
            padding: 2rem;
            margin-bottom: 3rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.02);
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .menu-card {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(139,92,246,0.1);
            border-radius: 30px;
            padding: 2.5rem 2rem;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.02);
        }

        .menu-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.7s ease;
        }

        .menu-card:hover::before {
            left: 100%;
        }

        .menu-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 30px 60px rgba(139,92,246,0.15);
            border-color: rgba(139,92,246,0.3);
        }

        .menu-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem;
            background: linear-gradient(135deg, rgba(139,92,246,0.1) 0%, rgba(236,72,153,0.1) 100%);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-icon i {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .menu-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
            color: var(--dark);
        }

        .menu-desc {
            color: var(--gray-4);
            font-size: 0.95rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container-fluid d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="/">
            <i class="fas fa-graduation-cap"></i>
            ADMIN
        </a>
        <a href="/admin/logout" class="btn-logout">
            <i class="fas fa-sign-out-alt me-2"></i>
            Déconnexion
        </a>
    </div>
</nav>

<div class="container">
    
    <div class="page-header">
        <h1 class="page-title">Tableau de bord</h1>
        <p class="text-muted mt-2">Gérez l'ensemble des données de l'établissement</p>
    </div>

    <div class="menu-grid">
        
        <a href="/professeurs" class="menu-card">
            <div class="menu-icon">
                <i class="fas fa-chalkboard-teacher"></i>
            </div>
            <h3 class="menu-title">Professeurs</h3>
            <p class="menu-desc">Ajouter, modifier, supprimer des professeurs</p>
        </a>
        
        <a href="/matieres" class="menu-card">
            <div class="menu-icon">
                <i class="fas fa-book"></i>
            </div>
            <h3 class="menu-title">Matières</h3>
            <p class="menu-desc">Gérer les matières et les professeurs associés</p>
        </a>
        
        <a href="/etudiants/liste" class="menu-card">
            <div class="menu-icon">
                <i class="fas fa-user-graduate"></i>
            </div>
            <h3 class="menu-title">Étudiants</h3>
            <p class="menu-desc">Gérer les inscriptions des étudiants</p>
        </a>
        
        <a href="/notes" class="menu-card">
            <div class="menu-icon">
                <i class="fas fa-chart-line"></i>
            </div>
            <h3 class="menu-title">Notes</h3>
            <p class="menu-desc">Saisir et modifier les notes</p>
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
