<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:if="${matiere == null or matiere.id == null}">Nouvelle matière</title>
    <title th:if="${matiere != null and matiere.id != null}">Modifier matière</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #8B5CF6;
            --secondary: #EC4899;
            --gradient-primary: linear-gradient(135deg, #8B5CF6 0%, #EC4899 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea10 0%, #764ba210 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .form-container {
            max-width: 600px;
            width: 100%;
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(12px) saturate(180%);
            border: 1px solid rgba(139,92,246,0.1);
            border-radius: 40px;
            padding: 3rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .form-header i {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }

        .form-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.8rem;
        }

        .form-group label {
            font-weight: 500;
            color: var(--dark);
            margin-bottom: 0.5rem;
            display: block;
        }

        .form-control, .form-select {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 2px solid rgba(139,92,246,0.1);
            border-radius: 20px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.8);
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 0 4px rgba(139,92,246,0.1);
            background: white;
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(139,92,246,0.3);
        }

        .btn-cancel {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--gray-4);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-cancel:hover {
            color: var(--primary);
            transform: translateX(-5px);
        }
    </style>
</head>
<body>

<div class="form-container">
    
    <div class="form-header">
        <i class="fas fa-book"></i>
        <h2 th:if="${matiere == null or matiere.id == null}">Nouvelle matière</h2>
        <h2 th:if="${matiere != null and matiere.id != null}">Modifier matière</h2>
        <p class="text-muted">Remplissez les informations ci-dessous</p>
    </div>

    <form th:action="@{/matieres/save}" th:object="${matiere}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="form-group">
            <label>Code</label>
            <input type="text" class="form-control" th:field="*{code}" placeholder="MAT101" required>
        </div>

        <div class="form-group">
            <label>Nom</label>
            <input type="text" class="form-control" th:field="*{nom}" placeholder="Mathématiques" required>
        </div>

        <div class="form-group">
            <label>Professeur</label>
            <select class="form-select" th:field="*{professeur}" required>
                <option value="">Sélectionner un professeur</option>
                <option th:each="prof : ${professeurs}" 
                        th:value="${prof.id}" 
                        th:text="${prof.prenom + ' ' + prof.nom}">
                </option>
            </select>
        </div>

        <button type="submit" class="btn-submit">
            <i class="fas fa-save"></i>
            <span th:if="${matiere == null or matiere.id == null}">Créer la matière</span>
            <span th:if="${matiere != null and matiere.id != null}">Mettre à jour</span>
        </button>
    </form>
    
    <a href="/matieres" class="btn-cancel">
        <i class="fas fa-arrow-left me-2"></i>
        Retour à la liste
    </a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
